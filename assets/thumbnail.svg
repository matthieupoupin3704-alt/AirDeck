<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="40" fill="url(#bg)"/>

  <!-- Music note stem -->
  <rect x="138" y="72" width="10" height="72" rx="5" fill="#7c6fff"/>

  <!-- Music note head -->
  <ellipse cx="124" cy="152" rx="18" ry="13" fill="#7c6fff" transform="rotate(-15 124 152)"/>

  <!-- Eighth note flag -->
  <path d="M148 72 Q175 88 168 112" stroke="#7c6fff" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Bluetooth symbol — compact, top-right area -->
  <g transform="translate(164, 76)" opacity="0.92">
    <!-- Vertical spine -->
    <line x1="12" y1="4" x2="12" y2="40" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
    <!-- Top-right arm -->
    <line x1="12" y1="4" x2="22" y2="14" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
    <!-- Bottom-right arm -->
    <line x1="12" y1="40" x2="22" y2="30" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
    <!-- Top-left arm -->
    <line x1="12" y1="14" x2="4" y2="22" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
    <!-- Bottom-left arm -->
    <line x1="12" y1="30" x2="4" y2="22" stroke="#4fc3f7" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Subtle connector arc between note and BT -->
  <path d="M148 110 Q156 100 164 96" stroke="#4fc3f7" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.35"/>

  <!-- Wordmark -->
  <text x="128" y="208" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#e8e8ff" text-anchor="middle" letter-spacing="2">AirDeck</text>
</svg>
