<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a35"/>
    </linearGradient>
    <!-- Subtle radial glow behind icon -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c6fff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#7c6fff;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="200" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="120" cy="100" rx="100" ry="80" fill="url(#glow)"/>

  <!-- Music note -->
  <g transform="translate(72, 48)">
    <rect x="34" y="0" width="8" height="56" rx="4" fill="#7c6fff"/>
    <ellipse cx="24" cy="62" rx="14" ry="10" fill="#7c6fff" transform="rotate(-15 24 62)"/>
    <path d="M42 0 Q65 12 60 34" stroke="#7c6fff" stroke-width="7" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Bluetooth symbol -->
  <g transform="translate(132, 64)" opacity="0.9">
    <line x1="10" y1="2" x2="10" y2="34" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="2" x2="18" y2="10" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="34" x2="18" y2="26" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="10" x2="3" y2="18" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="10" y1="26" x2="3" y2="18" stroke="#4fc3f7" stroke-width="3.5" stroke-linecap="round"/>
  </g>

  <!-- Vertical divider -->
  <line x1="186" y1="64" x2="186" y2="136" stroke="#ffffff" stroke-width="1" opacity="0.12"/>

  <!-- Wordmark -->
  <text x="206" y="114" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="48" font-weight="700" fill="#e8e8ff" letter-spacing="1">AirDeck</text>

  <!-- Tagline -->
  <text x="207" y="140" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#7c6fff" letter-spacing="3" opacity="0.85">BLUETOOTH MUSIC CONTROL</text>
</svg>
